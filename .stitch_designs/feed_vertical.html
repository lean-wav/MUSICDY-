<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Musicdy - Urban Music Feed</title>
<!-- Tailwind CSS v3 with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-animations">
    @keyframes pulse-waveform {
      0%, 100% { height: 20%; }
      50% { height: 100%; }
    }
    .waveform-bar {
      animation: pulse-waveform 1.2s ease-in-out infinite;
    }
    .waveform-bar:nth-child(2) { animation-delay: 0.1s; }
    .waveform-bar:nth-child(3) { animation-delay: 0.2s; }
    .waveform-bar:nth-child(4) { animation-delay: 0.3s; }
    .waveform-bar:nth-child(5) { animation-delay: 0.4s; }
    .waveform-bar:nth-child(6) { animation-delay: 0.5s; }
  </style>
<style data-purpose="ui-layout">
    body {
      background-color: #000;
      color: #fff;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      font-family: 'Space Grotesk', sans-serif;
    }
    /* Gradient overlay to ensure text readability over video */
    .video-overlay {
      background: linear-gradient(0deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 40%, rgba(0,0,0,0) 60%, rgba(0,0,0,0.4) 100%);
    }
  </style>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/></head>
<body class="relative flex flex-col justify-end">
<!-- BEGIN: Video Background Section -->
<div class="absolute inset-0 z-0 w-full h-full overflow-hidden bg-zinc-900" data-purpose="background-video-container">

<img alt="Rapper performing" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBs_0MEPEV_wvPRLy8k6rl0EHi0x87N2tOG1l2orA1_h2B08RBINbRMQdBh7mEvCVYSSW4ACdOuUvmDv2FFwvxZbe777PuxsPJuJXArwq8pp3apcBvtt6Oj3ga-dHUhAn5NviGJBSHserIWspYGhPAVUJlxDMz_G9kBxjFRanU5N9cOXWA3_1d-aqu_e8nHHLGW9fHBdfB7BcMiNpwpm2bOpAmAtAf9bsWEaN2BUWhxr0drzzKGDhJdZ4IyPm-nzFtTqI04xHzKgMcT"/>

<!-- BEGIN: Interaction UI -->

<div class="flex justify-between items-center w-full pt-4">
<div class="font-bold text-xl tracking-tighter italic">MUSICDY</div>
<div class="flex space-x-4">

<h2 class="text-white font-extrabold text-xl mb-0.5">@RealBeatMaker</h2>

<div class="flex items-end space-x-1 h-12 mb-6" data-purpose="audio-visualizer">

<div class="waveform-bar w-1 rounded-full h-4/5" style="background-color: #CCFF00;"></div>

<div class="waveform-bar w-1 rounded-full h-1/2" style="background-color: #CCFF00;"></div>

</svg>

</div>
</div>
